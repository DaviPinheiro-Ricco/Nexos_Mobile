kind = "mobile"
previewPath = "/"
title = "SPI Mobile"
version = "1.0.0"
id = "artifacts/spi-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 18111

[services.development]
run = "pnpm --filter @workspace/spi-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/spi-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/spi-mobile", "run", "serve" ]

[services.env]
PORT = "18111"
BASE_PATH = "/"
